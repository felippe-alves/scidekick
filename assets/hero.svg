<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" width="1280" height="420">
  <defs>

    <!-- 48px grid texture -->
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#1a2410" stroke-width="0.5"/>
    </pattern>

    <!-- radial vignette -->
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="100%" stop-color="#080a04" stop-opacity="0.55"/>
    </radialGradient>

    <!-- ambient glow behind the tree -->
    <radialGradient id="treeglow" cx="50%" cy="55%" r="45%">
      <stop offset="0%"   stop-color="#aac832" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- node glow: leaves -->
    <filter id="glow-leaf" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- node glow: inner -->
    <filter id="glow-mid" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- text glow for wordmark -->
    <filter id="glow-text" x="-15%" y="-40%" width="130%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- glyph glow -->
    <filter id="glow-glyph" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ── Base ── -->
  <rect width="1280" height="420" fill="#080a04"/>
  <rect width="1280" height="420" fill="url(#grid)"/>

  <!-- ambient haze over tree area -->
  <rect x="0" y="0" width="620" height="420" fill="url(#treeglow)"/>

  <!-- vignette -->
  <rect width="1280" height="420" fill="url(#vig)"/>

  <!-- ── Divider ── -->
  <line x1="600" y1="36" x2="600" y2="384" stroke="#1a2410" stroke-width="1"/>

  <!-- ══════════════════════════════════════
       LEFT SIDE — Binary tree
       Root:  (300,  90)
       L1:    (175, 200)  (425, 200)
       L2:    (100, 318)  (250, 318)  (350, 318)  (500, 318)
       ══════════════════════════════════════ -->

  <!-- Scattered ambient dots (very faint, graph network suggestion) -->
  <circle cx="40"  cy="60"  r="2" fill="#3d4822" opacity="0.5"/>
  <circle cx="540" cy="55"  r="2" fill="#3d4822" opacity="0.4"/>
  <circle cx="80"  cy="380" r="2" fill="#3d4822" opacity="0.4"/>
  <circle cx="510" cy="370" r="2" fill="#3d4822" opacity="0.5"/>
  <circle cx="55"  cy="200" r="1.5" fill="#5a6e32" opacity="0.4"/>
  <circle cx="555" cy="200" r="1.5" fill="#5a6e32" opacity="0.4"/>
  <line x1="40" y1="60" x2="100" y2="318" stroke="#1a2410" stroke-width="0.5" opacity="0.4"/>
  <line x1="540" y1="55" x2="500" y2="318" stroke="#1a2410" stroke-width="0.5" opacity="0.4"/>

  <!-- Tree edges — level 0 → 1 (dim olive) -->
  <line x1="300" y1="90"  x2="175" y2="200" stroke="#3d4822" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="300" y1="90"  x2="425" y2="200" stroke="#3d4822" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Tree edges — level 1 → 2 (slightly brighter) -->
  <line x1="175" y1="200" x2="100" y2="318" stroke="#4e6229" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="175" y1="200" x2="250" y2="318" stroke="#4e6229" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="425" y1="200" x2="350" y2="318" stroke="#4e6229" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="425" y1="200" x2="500" y2="318" stroke="#4e6229" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Level 2 leaves — bright chartreuse with glow -->
  <circle cx="100" cy="318" r="11" fill="#aac832" filter="url(#glow-leaf)"/>
  <circle cx="250" cy="318" r="11" fill="#aac832" filter="url(#glow-leaf)"/>
  <circle cx="350" cy="318" r="11" fill="#aac832" filter="url(#glow-leaf)"/>
  <circle cx="500" cy="318" r="11" fill="#aac832" filter="url(#glow-leaf)"/>

  <!-- Level 1 nodes — mid olive with glow -->
  <circle cx="175" cy="200" r="10" fill="#7b8f45" filter="url(#glow-mid)"/>
  <circle cx="425" cy="200" r="10" fill="#7b8f45" filter="url(#glow-mid)"/>

  <!-- Root — deep olive, subtle glow -->
  <circle cx="300" cy="90"  r="9"  fill="#5a6e32" filter="url(#glow-mid)"/>

  <!-- ══════════════════════════════════════
       RIGHT SIDE — Wordmark
       Centered at x=940
       ══════════════════════════════════════ -->

  <!-- ◉ glyph -->
  <text
    x="940" y="188"
    text-anchor="middle"
    font-family="monospace, 'Segoe UI Symbol', 'Apple Symbols'"
    font-size="60"
    fill="#aac832"
    filter="url(#glow-glyph)">◉</text>

  <!-- scidekick wordmark -->
  <text
    x="940" y="276"
    text-anchor="middle"
    font-family="'Courier New', 'Lucida Console', 'DejaVu Sans Mono', monospace"
    font-size="72"
    font-weight="bold"
    fill="#aac832"
    letter-spacing="-1"
    filter="url(#glow-text)">scidekick</text>

  <!-- tagline -->
  <text
    x="940" y="322"
    text-anchor="middle"
    font-family="'Courier New', 'Lucida Console', 'DejaVu Sans Mono', monospace"
    font-size="12"
    fill="#5a6e32"
    letter-spacing="5">AI RESEARCH CATALYST</text>

</svg>
